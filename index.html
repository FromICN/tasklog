<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskLog</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' fill='%234F6EF7'>TL</text></svg>">
  <link rel="stylesheet" href="style.css?v=20260708c">
  <link rel="stylesheet" href="profile-modal.css?v=20260625a">
  <link rel="stylesheet" href="login.css?v=20260625a">
  <script>
    // 자동 로그인/세션 토큰이 있으면 → 새로고침 직후 로그인 게이트가 깜빡이지 않도록
    // 페인트 전에 미리 숨긴다. (자동 로그인이 실패하면 auth.js가 다시 보여줌)
    (function () {
      try {
        var hasToken = false;
        var raw = sessionStorage.getItem('tasklog-token');
        if (raw) { var t = JSON.parse(raw); hasToken = !!(t && t.access_token && Date.now() < t.expires_at); }
        var autoOn = localStorage.getItem('tasklog-auto-login') === 'true';
        if (hasToken || autoOn) document.documentElement.classList.add('preauth-hide-gate');
      } catch (e) {}
    })();
  </script>
  <script src="https://apis.google.com/js/api.js"></script>
  <script src="https://accounts.google.com/gsi/client"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

<!-- ===== 🔐 전체화면 로그인 게이트 (로그인 전까지 앱을 덮음) ===== -->
<div id="login-gate" class="login-gate">
  <div class="login-card">
    <h1 class="login-title">로그인</h1>
    <p class="login-subtitle">TaskLog에 오신 것을 환영합니다.</p>
    <button id="gate-google-btn" class="login-google-btn" onclick="handleSignIn()">
      <span class="g-icon">G</span> 구글로 로그인
    </button>
    <label class="login-keep">
      <input type="checkbox" id="keep-login" checked> 로그인 상태 유지
    </label>
    <p class="login-hint">로그인하면 어느 기기에서든 내 가계부·할 일이<br>자동으로 동기화됩니다.</p>
  </div>
</div>

<div class="app">

  <!-- 모바일 드로어 배경 (사이드바 열렸을 때 본문을 덮음) -->
  <div class="sidebar-backdrop" id="sidebar-backdrop" onclick="closeMobileSidebar()"></div>

  <!-- ===== 66px 사이드바 ===== -->
  <aside class="sidebar" id="sidebar">

    <!-- 상단 아바타 (로그인 프로필) -->
    <div class="sidebar-top">
      <div class="avatar-circle" id="sidebar-avatar" title="프로필 / 로그인" onclick="openProfilePanel()">M</div>
    </div>

    <!-- 메뉴 -->
    <nav class="sidebar-nav" id="sidebar-nav">
      <!-- JS로 채워짐 -->
    </nav>

    <!-- 하단: 백업 + 설정 -->
    <div class="sidebar-bottom">
      <button class="nav-item" id="backup-nav-btn" title="지금 백업" onclick="backupToDrive()">
        <span class="nav-item-icon">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 16l-4-4-4 4"/>
            <path d="M12 12v9"/>
            <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
          </svg>
        </span>
        <span class="nav-item-label">백업</span>
      </button>
      <button class="nav-item" id="settings-nav-btn" title="설정" onclick="openSettings()">
        <span class="nav-item-icon">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </span>
        <span class="nav-item-label">설정</span>
      </button>
    </div>
  </aside>

  <!-- ===== 중앙 + 오른쪽 패널 래퍼 ===== -->
  <div class="content-wrapper">

    <!-- 메인 콘텐츠 -->
    <main class="main-content" id="main-content">

      <!-- 탑바 -->
      <div class="topbar" id="topbar">
        <div class="topbar-left">
          <button class="sidebar-toggle" id="sidebar-toggle" aria-label="메뉴 열기" onclick="toggleMobileSidebar()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 6h18M3 12h18M3 18h18"/>
            </svg>
          </button>
          <div class="topbar-title" id="topbar-title">홈</div>
        </div>
        <div class="topbar-right" id="topbar-right">
          <div class="topbar-date" id="topbar-date"></div>
          <!-- 만다라트 연도 선택 슬롯 -->
          <div class="topbar-mdt-year-slot" id="topbar-mdt-year-slot"></div>
          <!-- 통합 필터/정렬 슬롯 (타이틀 오른쪽) -->
          <div class="topbar-filter-slot" id="topbar-filter-slot"></div>
        </div>
      </div>

      <!-- 페이지 콘텐츠 영역 -->
      <div id="page-content" style="flex:1;overflow-y:auto;">
        <!-- JS로 채워짐 -->
      </div>

    </main>

    <!-- ===== 오른쪽 패널 ===== -->
    <div class="right-panel" id="right-panel">
      <div class="rp-header">
        <span class="rp-title" id="rp-title">새 Task 생성</span>
        <button class="rp-close" onclick="closeRightPanel()">✕</button>
      </div>
      <div class="rp-body" id="rp-body">
        <!-- JS로 채워짐 -->
      </div>
      <div class="rp-footer">
        <button class="btn-primary" onclick="saveRightPanel()">저장</button>
        <button class="btn-secondary" onclick="closeRightPanel()">취소</button>
      </div>
    </div>

  </div><!-- .content-wrapper -->

</div><!-- .app -->

<!-- 날짜 클릭 팝업 (캘린더) -->
<div class="cal-popup" id="cal-popup" style="display:none;"></div>

<!-- 스크립트 로드 순서 -->
<script src="config.js?v=20260625a"></script>
<script src="backup-core.js?v=20260708b"></script>
<script src="backup-xlsx.js?v=20260625c"></script>
<script src="backup-pg-board.js?v=20260626a"></script>
<script src="backup-pg-wdlw.js?v=20260625b"></script>
<script src="backup-pg-mdt.js?v=20260625b"></script>
<script src="auth.js?v=20260625a"></script>
<script src="calendar.js?v=20260625b"></script>
<script src="mandalart.js?v=20260625a"></script>
<script src="lifewheel.js?v=20260626b"></script>
<script src="home.js?v=20260708c"></script>
<script src="gantt.js?v=20260625a"></script>
<script src="notes.js?v=20260627d"></script>
<script src="journal.js?v=20260625a"></script>
<script src="wbs.js?v=20260627c"></script>
<script src="mvv.js?v=20260625a"></script>
<script src="settings.js?v=20260625b"></script>
<script src="drive.js?v=20260625a"></script>
<script src="todo.js?v=20260708b"></script>
<script src="yearsync.js?v=20260625a"></script>
<script src="tlfilter.js?v=20260708b"></script>
<script src="colresize.js?v=20260626a"></script>
<script src="script.js?v=20260627d"></script>

</body>
</html>
