<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskLog</title>
  <link rel="icon" type="image/svg+xml" href="tasklog-icon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="stylesheet" href="style.css?v=20260722">
  <link rel="stylesheet" href="profile-modal.css?v=20260722">
  <link rel="stylesheet" href="login.css?v=20260720b">
  <script>
    // 자동 로그인/세션 토큰이 있으면 → 새로고침 직후 로그인 게이트가 깜빡이지 않도록
    // 페인트 전에 미리 숨긴다. (자동 로그인이 실패하면 auth.js가 다시 보여줌)
    (function () {
      try {
        var hasToken = false;
        var raw = localStorage.getItem('tasklog-token');
        if (raw) { var t = JSON.parse(raw); hasToken = !!(t && t.access_token && Date.now() < t.expires_at); }
        var autoOn = localStorage.getItem('tasklog-auto-login') === 'true';
        if (hasToken || autoOn) document.documentElement.classList.add('preauth-hide-gate');
      } catch (e) {}
    })();
  </script>
  <script src="https://apis.google.com/js/api.js"></script>
  <script src="https://accounts.google.com/gsi/client"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

<!-- ===== 🔐 전체화면 로그인 게이트 (로그인 전까지 앱을 덮음) ===== -->
<div id="login-gate" class="login-gate">
  <div class="login-card">
    <h1 class="login-title">로그인</h1>
    <p class="login-subtitle">계정으로 계속하세요</p>
    <button id="gate-google-btn" class="login-google-btn" onclick="handleSignIn()">
      <span class="g-icon" aria-hidden="true">
        <svg width="20" height="20" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
      </span> 구글로 로그인
    </button>
    <label class="login-keep">
      <input type="checkbox" id="keep-login" checked> 로그인 상태 유지
    </label>
  </div>
</div>

<div class="app">

  <!-- ===== 66px 사이드바 ===== -->
  <aside class="sidebar" id="sidebar">

    <!-- 상단: 아바타 + 접기/펼치기 -->
    <div class="sidebar-top">
      <div class="avatar-circle" id="sidebar-avatar" title="프로필 / 로그인" onclick="openProfilePanel()">M</div>
    </div>

    <!-- 메뉴 -->
    <nav class="sidebar-nav" id="sidebar-nav">
      <!-- JS로 채워짐 -->
    </nav>

    <!-- 하단: 설정 (테마 전환은 Setting > 화면 탭에서) -->
    <div class="sidebar-bottom">
      <button class="nav-item" id="settings-nav-btn" title="Setting" onclick="openSettings()">
        <span class="nav-item-icon">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </span>
        <span class="nav-item-label">Setting</span>
      </button>
    </div>
  </aside>

  <!-- ===== 모바일 드로어용 스크림 (사이드바 뒤 어둡게) ===== -->
  <div class="sidebar-scrim" id="sidebar-scrim" onclick="closeSidebar()"></div>

  <!-- ===== 중앙 + 오른쪽 패널 래퍼 ===== -->
  <div class="content-wrapper">

    <!-- 메인 콘텐츠 -->
    <main class="main-content" id="main-content">

      <!-- 탑바 -->
      <div class="topbar" id="topbar">
        <div class="topbar-left">
          <button class="mobile-menu-btn" id="mobile-menu-btn" onclick="toggleSidebar()" aria-label="메뉴 열기">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="3" y1="6" x2="21" y2="6"/>
              <line x1="3" y1="12" x2="21" y2="12"/>
              <line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
          </button>
          <div class="topbar-title" id="topbar-title">홈</div>
        </div>
        <div class="topbar-right" id="topbar-right">
          <div class="topbar-date" id="topbar-date"></div>
          <!-- 만다라트 연도 선택 슬롯 -->
          <div class="topbar-mdt-year-slot" id="topbar-mdt-year-slot"></div>
          <!-- TO-DO(계획된 일정)에서만: 새 Task 버튼 -->
          <button class="btn-primary" id="new-task-btn" onclick="openNewTaskPanel()" style="display:none;">
            <span style="font-size:16px;line-height:1">+</span> Task
          </button>
        </div>
      </div>

      <!-- 페이지 콘텐츠 영역 -->
      <div id="page-content" style="flex:1;overflow-y:auto;">
        <!-- JS로 채워짐 -->
      </div>

    </main>

    <!-- ===== 오른쪽 패널 ===== -->
    <div class="right-panel" id="right-panel">
      <div class="rp-header">
        <span class="rp-title" id="rp-title">새 Task 생성</span>
        <button class="rp-close" onclick="closeRightPanel()">✕</button>
      </div>
      <div class="rp-body" id="rp-body">
        <!-- JS로 채워짐 -->
      </div>
      <div class="rp-footer">
        <button class="btn-primary" onclick="saveRightPanel()">저장</button>
        <button class="btn-secondary" onclick="closeRightPanel()">취소</button>
      </div>
    </div>

  </div><!-- .content-wrapper -->

</div><!-- .app -->

<!-- 날짜 클릭 팝업 (캘린더) -->
<div class="cal-popup" id="cal-popup" style="display:none;"></div>

<!-- 스크립트 로드 순서 -->
<script src="config.js?v=20260722"></script>
<script src="colresize.js?v=20260722"></script>
<script src="backup-core.js?v=20260722"></script>
<script src="backup-xlsx.js?v=20260722"></script>
<script src="auth.js?v=20260722"></script>
<script src="calendar.js?v=20260722"></script>
<script src="mandalart.js?v=20260722"></script>
<script src="lifewheel.js?v=20260722"></script>
<script src="home.js?v=20260722"></script>
<script src="gantt.js?v=20260722"></script>
<script src="notes.js?v=20260722"></script>
<script src="journal.js?v=20260722"></script>
<script src="wbs.js?v=20260722"></script>
<script src="mvv.js?v=20260722"></script>
<script src="settings.js?v=20260722"></script>
<script src="drive.js?v=20260722"></script>
<script src="todo.js?v=20260722"></script>
<script src="yearsync.js?v=20260722"></script>
<script src="script.js?v=20260722"></script>

</body>
</html>
